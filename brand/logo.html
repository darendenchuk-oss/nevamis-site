<!doctype html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700&display=swap" rel="stylesheet">
<style>
  * { margin:0; box-sizing:border-box; }
  body { width:720px; height:720px; overflow:hidden; position:relative;
    background: linear-gradient(165deg,#0B1620 0%,#10222E 78%,#123028 100%);
    display:flex; align-items:center; justify-content:center;
    font-family:"Bricolage Grotesque",sans-serif; }
  .glow { position:absolute; right:-120px; top:-120px; width:520px; height:400px; border-radius:50%;
    background: radial-gradient(ellipse at center,#2FBF8F 0%,#1F8A6D 45%,transparent 72%);
    filter: blur(70px); opacity:.38; transform:rotate(-20deg); }
  .inner { position:relative; text-align:center; }
  .n { font-size:340px; font-weight:700; line-height:.9; color:#EAF2F0; letter-spacing:-0.04em; }
  .n span { color:#2FBF8F; }
  .name { margin-top:28px; font-size:56px; font-weight:700; letter-spacing:-0.02em; color:#EAF2F0; }
  .name span { color:#2FBF8F; }
</style></head>
<body>
  <div class="glow"></div>
  <div class="inner">
    <div class="n">N<span>.</span></div>
    <div class="name">Nevamis<span>&nbsp;AI</span></div>
  </div>
</body></html>
