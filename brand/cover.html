<!doctype html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Spline+Sans+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  * { margin:0; box-sizing:border-box; }
  body { width:1024px; height:576px; overflow:hidden; position:relative;
    background: linear-gradient(180deg,#0B1620 0%,#10222E 70%,#12242F 100%);
    font-family:"Bricolage Grotesque",sans-serif; display:flex; align-items:center; justify-content:center; }
  .aur1 { position:absolute; right:-160px; top:-140px; width:760px; height:460px; border-radius:50%;
    background: radial-gradient(ellipse at center,#2FBF8F 0%,#1F8A6D 40%,transparent 70%);
    filter: blur(64px); opacity:.44; transform: rotate(-18deg); }
  .aur2 { position:absolute; right:40px; top:70px; width:520px; height:300px; border-radius:50%;
    background: radial-gradient(ellipse at center,#74E0B8 0%,#2FBF8F 45%,transparent 72%);
    filter: blur(58px); opacity:.30; transform: rotate(-30deg); }
  .ember { position:absolute; left:0; right:0; bottom:-130px; height:260px;
    background: radial-gradient(ellipse at 30% 100%, rgba(217,107,43,.16) 0%, transparent 60%); }
  .inner { position:relative; text-align:center; }
  .word { font-size:92px; font-weight:700; letter-spacing:-0.025em; color:#EAF2F0; line-height:1; }
  .word span { color:#2FBF8F; }
  .tag { margin-top:22px; font-size:26px; color:#A9BDB9; font-weight:600; letter-spacing:-0.01em; }
  .sub { margin-top:26px; font-family:"Spline Sans Mono",monospace; font-size:17px; letter-spacing:.14em; color:#2FBF8F; text-transform:uppercase; }
</style></head>
<body>
  <div class="aur1"></div><div class="aur2"></div><div class="ember"></div>
  <div class="inner">
    <div class="word">Nevamis<span>&nbsp;AI</span></div>
    <div class="tag">Your calls answered. 24/7. Every lead captured.</div>
    <div class="sub">AI receptionists · Edmonton, Canada</div>
  </div>
</body></html>
